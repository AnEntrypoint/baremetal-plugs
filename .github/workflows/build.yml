name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: baremetal-vital

      - name: install toolchain
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: clone circle
        run: git clone --depth 1 https://github.com/rsta2/circle.git circle

      - name: clone vital
        run: git clone --depth 1 https://github.com/mtytel/vital.git vital

      - name: build circle libs
        working-directory: circle
        run: |
          make -C lib           RASPPI=4 AARCH=64 PREFIX64=aarch64-linux-gnu-
          make -C lib/usb       RASPPI=4 AARCH=64 PREFIX64=aarch64-linux-gnu-
          make -C lib/input     RASPPI=4 AARCH=64 PREFIX64=aarch64-linux-gnu-
          make -C lib/fs        RASPPI=4 AARCH=64 PREFIX64=aarch64-linux-gnu-
          make -C lib/sched     RASPPI=4 AARCH=64 PREFIX64=aarch64-linux-gnu-
          make -C lib/sound     RASPPI=4 AARCH=64 PREFIX64=aarch64-linux-gnu-

      - name: build kernel
        working-directory: baremetal-vital
        run: make RASPPI=4 AARCH=64 PREFIX64=aarch64-linux-gnu- STDLIB_SUPPORT=1

      - uses: actions/upload-artifact@v4
        with:
          name: kernel8-rpi4
          path: baremetal-vital/kernel8-rpi4.img
