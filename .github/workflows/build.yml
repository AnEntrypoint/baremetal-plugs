name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  TOOLCHAIN_VER: 13.3.rel1
  TOOLCHAIN_NAME: arm-gnu-toolchain-13.3.rel1-x86_64-aarch64-none-elf

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: baremetal-vital

      - name: cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: /opt/${{ env.TOOLCHAIN_NAME }}
          key: arm-gnu-toolchain-${{ env.TOOLCHAIN_VER }}

      - name: download toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl -fL "https://developer.arm.com/-/media/Files/downloads/gnu/${{ env.TOOLCHAIN_VER }}/binrel/${{ env.TOOLCHAIN_NAME }}.tar.xz" \
            -o toolchain.tar.xz
          sudo tar -xf toolchain.tar.xz -C /opt
          rm toolchain.tar.xz

      - name: add toolchain to path
        run: echo "/opt/${{ env.TOOLCHAIN_NAME }}/bin" >> $GITHUB_PATH

      - name: clone circle
        run: git clone --depth 1 https://github.com/rsta2/circle.git circle

      - name: clone vital
        run: git clone --depth 1 https://github.com/mtytel/vital.git vital


      - name: patch vital sources
        working-directory: vital
        run: |
          sed -i '/void disableModSource/a\      void setPitchWheelControl(Value*) {}\n      void setModWheelControl(Value*) {}' src/synthesis/effects_engine/effects_modulation_handler.h
          sed -i 's|#include "synth_module.h"|#include "synth_module.h"\n#include "envelope.h"|' src/synthesis/modules/envelope_module.h
      - name: build circle libs
        working-directory: circle
        run: |
          make -C lib       RASPPI=4 AARCH=64
          make -C lib/usb   RASPPI=4 AARCH=64
          make -C lib/input RASPPI=4 AARCH=64
          make -C lib/fs    RASPPI=4 AARCH=64
          make -C lib/sched RASPPI=4 AARCH=64
          make -C lib/sound RASPPI=4 AARCH=64

      - name: build kernel
        working-directory: baremetal-vital
        run: make RASPPI=4 AARCH=64 STDLIB_SUPPORT=3

      - uses: actions/upload-artifact@v4
        with:
          name: kernel8-rpi4
          path: baremetal-vital/kernel8-rpi4.img
